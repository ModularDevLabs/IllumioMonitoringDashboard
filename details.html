<!DOCTYPE html>
<html>
<head>
    <title>Illumio Drilldown</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --illumio-orange: rgb(250, 102, 36);
            --bg: #f8f9fa;
            --text: #111;
            --card-bg: #fff;
            --muted: #6c757d;
        }
        body[data-theme="dark"] {
            --bg: #393b3f;
            --text: #f7fafc;
            --card-bg: #4a4e54;
            --muted: #e3eaf0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.45;
            letter-spacing: 0.01em;
        }
        .dashboard-shell {
            width: min(98vw, 1920px);
            margin: 0 auto;
            padding: 0 16px;
        }
        .topbar {
            background: var(--illumio-orange);
            color: white;
            padding: 16px 0;
            margin-bottom: 20px;
        }
        .card {
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-radius: 12px;
            background: var(--card-bg);
        }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .chart-wrap { height: 330px; }
        .trend-controls { gap: 8px; }
        .range-controls { gap: 6px; }
        .status-meta {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .text-muted { color: var(--muted) !important; }
        body[data-theme="dark"] .card,
        body[data-theme="dark"] .card h1,
        body[data-theme="dark"] .card h2,
        body[data-theme="dark"] .card h3,
        body[data-theme="dark"] .card h4,
        body[data-theme="dark"] .card h5,
        body[data-theme="dark"] .card h6,
        body[data-theme="dark"] .card div,
        body[data-theme="dark"] .card p,
        body[data-theme="dark"] .card span,
        body[data-theme="dark"] .card li {
            color: var(--text);
        }
        body[data-theme="dark"] .list-group-item {
            background: #575e67;
            color: var(--text);
            border-color: #6f7782;
        }
        body[data-theme="dark"] .btn-outline-primary,
        body[data-theme="dark"] .btn-outline-secondary {
            color: #f6f9fc;
            border-color: #d4dbe3;
        }
        body[data-theme="dark"] .btn-light {
            background: #646d78;
            border-color: #aeb8c4;
            color: #fff;
        }
        @media print {
            #actions { display: none !important; }
            body { background: #fff !important; color: #000 !important; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
        @media (max-width: 768px) {
            .chart-wrap { height: 270px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="dashboard-shell d-flex justify-content-between align-items-center">
            <div class="h5 mb-0">Illumio Monitoring Dashboard</div>
            <div id="actions" class="d-flex gap-2">
                <button id="btn-theme" type="button" class="btn btn-light btn-sm">Dark Mode</button>
                <a id="btn-csv" href="#" class="btn btn-light btn-sm">Export CSV</a>
                <button id="btn-pdf" type="button" class="btn btn-light btn-sm">Export PDF</button>
                <a href="/trends" class="btn btn-light btn-sm">Trend View</a>
                <a href="/" class="btn btn-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </div>

        <div class="dashboard-shell">
        <div class="card p-3">
            <h5 id="title">Loading...</h5>
            <div class="text-muted mb-3" id="count"></div>
            <div class="status-meta" id="refresh-meta"></div>
            <div id="trend-controls" class="d-none d-flex trend-controls mb-2">
                <button id="trend-raw" type="button" class="btn btn-sm btn-outline-primary">24h (5m)</button>
                <button id="trend-sum" type="button" class="btn btn-sm btn-outline-secondary">Daily</button>
            </div>
            <div id="range-controls" class="d-none d-flex range-controls mb-2">
                <button id="range-7" type="button" class="btn btn-sm btn-outline-secondary">7d</button>
                <button id="range-30" type="button" class="btn btn-sm btn-outline-secondary">30d</button>
                <button id="range-90" type="button" class="btn btn-sm btn-outline-secondary">90d</button>
                <button id="range-180" type="button" class="btn btn-sm btn-outline-secondary">180d</button>
                <button id="range-365" type="button" class="btn btn-sm btn-outline-secondary">365d</button>
            </div>
            <div id="trend-wrap" class="chart-wrap mb-3 d-none">
                <canvas id="trend-chart"></canvas>
            </div>
            <div id="blocked-ports-wrap" class="d-none mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <h6 class="mb-0">Blocked Ports (Daily Aggregate)</h6>
                    <button id="btn-toggle-blocked-ports" type="button" class="btn btn-sm btn-outline-secondary">Collapse</button>
                </div>
                <div class="text-muted small mb-2" id="blocked-ports-meta"></div>
                <div id="blocked-ports-table-wrap" class="table-responsive">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Port/Proto</th>
                                <th class="text-end">Total Flows</th>
                            </tr>
                        </thead>
                        <tbody id="blocked-ports-body"></tbody>
                    </table>
                </div>
            </div>
            <div id="blocked-hosts-wrap" class="d-none mb-3">
                <h6>Blocked Hostnames (Daily Aggregate)</h6>
                <div class="text-muted small mb-2" id="blocked-hosts-meta"></div>
                <div class="table-responsive">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Hostname</th>
                                <th class="text-end">Outbound</th>
                                <th class="text-end">Inbound</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="blocked-hosts-body"></tbody>
                    </table>
                </div>
            </div>
            <ul class="list-group" id="items"></ul>
        </div>
    </div>

    <script src="/static/ui-common.js"></script>
    <script>
        let trendChart = null;
        let trendPoints = [];
        let trendMode = 'raw';
        let trendBaseline = 0;
        let trendBaselineCaptured = null;
        let currentMetric = '';
        let trend24h = [];
        let trendDaily = [];
        let trendMA24h = [];
        let trendMADaily = [];
        let blockedMAWindow = 12;
        let blockedAnomalyPct = 50;
        let blockedAnomalySource = '5m';
        let blockedPortDailyEnabled = true;
        let blockedPortsDaily = [];
        let blockedHostMetricsEnabled = false;
        let blockedHostRetentionMode = 'rolling_24h_plus_daily';
        let blockedHostsDaily = [];
        let blockedHosts24h = [];
        let blockedPortsCollapsed = false;
        const THEME_KEY = 'illumio_theme';
        let dayRange = 30;
        let nextRefreshAt = null;
        let statusTimer = null;
        let lastSnapshotTS = null;

        function queryMetric() {
            const p = new URLSearchParams(window.location.search);
            return p.get('metric') || '';
        }

        function queryTarget() {
            const p = new URLSearchParams(window.location.search);
            return p.get('target') || '';
        }

        function updateTrendButtons() {
            const raw = document.getElementById('trend-raw');
            const sum = document.getElementById('trend-sum');
            raw.className = `btn btn-sm ${trendMode === 'raw' ? 'btn-primary' : 'btn-outline-primary'}`;
            sum.className = `btn btn-sm ${trendMode === 'sum' ? 'btn-primary' : 'btn-outline-secondary'}`;
        }

        function updateRangeButtons() {
            [7, 30, 90, 180, 365].forEach((d) => {
                const btn = document.getElementById(`range-${d}`);
                if (!btn) return;
                btn.className = `btn btn-sm ${dayRange === d ? 'btn-primary' : 'btn-outline-secondary'}`;
            });
        }

        function isDarkTheme() {
            return document.body.getAttribute('data-theme') === 'dark';
        }

        function applyTheme(theme) {
            UICommon.setTheme(theme, THEME_KEY, 'btn-theme');
            if (trendPoints && trendPoints.length > 0) {
                renderTrend(trendPoints, document.getElementById('title').innerText, { hideList: currentMetric === 'blocked_target', showControls: true });
            }
        }

        function initTheme() {
            UICommon.applyTheme(THEME_KEY, 'btn-theme');
            document.getElementById('btn-theme').addEventListener('click', () => {
                applyTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            });
        }

        function updateRefreshMeta() {
            const el = document.getElementById('refresh-meta');
            if (!el) return;
            el.textContent = `${UICommon.nextRefreshText(nextRefreshAt)} | ${UICommon.formatStaleness(UICommon.parseTS(lastSnapshotTS))}`;
        }

        function filteredDaily(points) {
            if (!points || points.length === 0) return [];
            const cutoff = Date.now() - dayRange * 24 * 60 * 60 * 1000;
            return points.filter((p) => new Date(p.timestamp).getTime() >= cutoff);
        }

        function setExportLinks() {
            const metric = queryMetric();
            const target = queryTarget();
            const p = new URLSearchParams();
            if (metric) p.set('metric', metric);
            if (target) p.set('target', target);
            document.getElementById('btn-csv').href = `/api/export/drilldown.csv?${p.toString()}`;
            document.getElementById('btn-pdf').addEventListener('click', () => window.print());
        }

        function valuesForMode(points) {
            const raw = points.map((p) => p.value || 0);
            if (currentMetric === 'ven_warning' || currentMetric === 'ven_error') {
                return raw;
            }
            return raw;
        }

        function yAxisBoundsFromValues(values) {
            const nums = (values || []).filter((v) => Number.isFinite(v));
            if (!nums.length) return { beginAtZero: true, min: 0, max: 10, stepSize: 1 };
            const min = Math.min(...nums);
            const max = Math.max(...nums);
            if (max <= 10) {
                const yMin = Math.max(0, Math.floor(min));
                const yMax = Math.max(yMin + 1, Math.ceil(max));
                return { beginAtZero: yMin === 0, min: yMin, max: yMax, stepSize: 1 };
            }
            let step = Math.pow(10, Math.max(0, Math.floor(Math.log10(max)) - 1));
            if (max >= 10 && step < 10) step = 10;
            let yMin = min <= 0 ? 0 : Math.floor(min / step) * step;
            if (yMin < 0) yMin = 0;
            let yMax = Math.ceil(max / step) * step;
            if (yMax <= yMin) yMax = yMin + step;
            return { beginAtZero: yMin === 0, min: yMin, max: yMax, stepSize: step };
        }

        function renderTrend(points, title, opts = {}) {
            const hideList = !!opts.hideList;
            const showControls = !!opts.showControls;
            const wrap = document.getElementById('trend-wrap');
            const list = document.getElementById('items');
            const controls = document.getElementById('trend-controls');
            const range = document.getElementById('range-controls');
            const forceZeroChart = currentMetric === 'ven_warning' ||
                currentMetric === 'ven_error' ||
                currentMetric === 'tampering' ||
                String(currentMetric || '').startsWith('mode_') ||
                currentMetric === 'blocked_target';
            if ((!points || points.length === 0) && currentMetric === 'blocked_target' && trendBaseline > 0) {
                points = [{ timestamp: trendBaselineCaptured || new Date().toISOString(), value: trendBaseline }];
            }
            if ((!points || points.length === 0) && forceZeroChart) {
                points = [{ timestamp: new Date().toISOString(), value: 0 }];
            }
            if (!points || points.length === 0) {
                wrap.classList.add('d-none');
                controls.classList.add('d-none');
                range.classList.add('d-none');
                list.classList.remove('d-none');
                return;
            }
            wrap.classList.remove('d-none');
            if (showControls) {
                controls.classList.remove('d-none');
                updateTrendButtons();
                if (trendMode === 'sum') {
                    range.classList.remove('d-none');
                    updateRangeButtons();
                    points = filteredDaily(points);
                } else {
                    range.classList.add('d-none');
                }
            } else {
                controls.classList.add('d-none');
                range.classList.add('d-none');
                trendMode = 'raw';
            }
            if (hideList) {
                list.classList.add('d-none');
            } else {
                list.classList.remove('d-none');
            }

            const isDaily = trendMode === 'sum';
            const labels = points.map((p) => isDaily
                ? new Date(p.timestamp).toLocaleDateString()
                : new Date(p.timestamp).toLocaleTimeString());
            let values = valuesForMode(points);
            let maPoints = trendMode === 'sum' ? trendMADaily : trendMA24h;
            if (trendMode === 'sum') maPoints = filteredDaily(maPoints);
            const ctx = document.getElementById('trend-chart').getContext('2d');
            const tickColor = isDarkTheme() ? '#e7edf3' : '#333';
            const gridColor = isDarkTheme() ? 'rgba(220,228,235,0.22)' : 'rgba(0,0,0,0.10)';
            const datasets = [{
                label: trendMode === 'sum'
                    ? (title || 'Trend') + ' (daily)'
                    : (title || 'Trend') + ' (24h, 5m)',
                data: values,
                borderColor: 'rgb(250, 102, 36)',
                backgroundColor: 'rgba(250, 102, 36, 0.15)',
                tension: 0.25,
                fill: true,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointHitRadius: 8
            }];
            if (maPoints && maPoints.length > 0) {
                const maByTS = new Map(maPoints.map((p) => [new Date(p.timestamp).toISOString(), Number(p.value || 0)]));
                const maLabel = blockedAnomalySource === 'daily'
                    ? `Daily Baseline (${blockedMAWindow} day${blockedMAWindow === 1 ? '' : 's'}, ${blockedAnomalyPct}% threshold)`
                    : `Moving Avg (${blockedMAWindow} points, ${blockedAnomalyPct}% threshold)`;
                datasets.push({
                    label: maLabel,
                    data: points.map((p) => maByTS.get(new Date(p.timestamp).toISOString()) ?? null),
                    borderColor: '#17a2b8',
                    backgroundColor: 'rgba(23, 162, 184, 0.10)',
                    tension: 0.2,
                    fill: false,
                    pointRadius: 2,
                    pointHoverRadius: 4,
                    pointHitRadius: 7,
                    borderWidth: 2
                });
            }
            const allSeriesValues = datasets
                .flatMap((ds) => Array.isArray(ds.data) ? ds.data : [])
                .filter((v) => Number.isFinite(v));
            const axis = yAxisBoundsFromValues(allSeriesValues);
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            ticks: { color: tickColor },
                            grid: { color: gridColor }
                        },
                        y: {
                            beginAtZero: axis.beginAtZero,
                            min: axis.min,
                            max: axis.max,
                            ticks: { color: tickColor, stepSize: axis.stepSize },
                            grid: { color: gridColor }
                        }
                    },
                    plugins: { legend: { labels: { color: tickColor } } },
                    animation: false
                }
            });
            UICommon.makeChartZoomable(trendChart, title);
            renderBlockedPortsTable();
            renderBlockedHostsTable();
        }

        function renderBlockedPortsTable() {
            const wrap = document.getElementById('blocked-ports-wrap');
            const tableWrap = document.getElementById('blocked-ports-table-wrap');
            const toggleBtn = document.getElementById('btn-toggle-blocked-ports');
            const body = document.getElementById('blocked-ports-body');
            const meta = document.getElementById('blocked-ports-meta');
            if (currentMetric !== 'blocked_target') {
                wrap.classList.add('d-none');
                return;
            }
            wrap.classList.remove('d-none');
            if (tableWrap && toggleBtn) {
                tableWrap.classList.toggle('d-none', blockedPortsCollapsed);
                toggleBtn.innerText = blockedPortsCollapsed ? 'Expand' : 'Collapse';
            }
            if (!blockedPortDailyEnabled) {
                body.innerHTML = '<tr><td colspan="2" class="text-muted">Blocked port daily aggregation is disabled in settings.</td></tr>';
                meta.innerText = 'Disabled.';
                return;
            }
            const cutoff = Date.now() - dayRange * 24 * 60 * 60 * 1000;
            const totals = new Map();
            (blockedPortsDaily || []).forEach((d) => {
                const ts = new Date(d.timestamp).getTime();
                if (!Number.isFinite(ts) || ts < cutoff) return;
                (d.ports || []).forEach((p) => {
                    const key = String(p.key || '').trim();
                    const n = Number(p.count || 0);
                    if (!key || !Number.isFinite(n) || n <= 0) return;
                    totals.set(key, (totals.get(key) || 0) + n);
                });
            });
            const rows = Array.from(totals.entries())
                .map(([key, count]) => ({ key, count }))
                .sort((a, b) => b.count - a.count || a.key.localeCompare(b.key));
            body.innerHTML = '';
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="2" class="text-muted">No blocked ports recorded for selected daily range.</td></tr>';
            } else {
                rows.forEach((r) => {
                    const tr = document.createElement('tr');
                    const keyTd = document.createElement('td');
                    keyTd.className = 'mono';
                    keyTd.innerText = String(r.key || '');
                    const countTd = document.createElement('td');
                    countTd.className = 'text-end';
                    countTd.innerText = Number(r.count || 0).toLocaleString();
                    tr.appendChild(keyTd);
                    tr.appendChild(countTd);
                    body.appendChild(tr);
                });
            }
            meta.innerText = `All blocked ports across last ${dayRange} day(s), including today-so-far.`;
        }

        function renderBlockedHostsTable() {
            const wrap = document.getElementById('blocked-hosts-wrap');
            const body = document.getElementById('blocked-hosts-body');
            const meta = document.getElementById('blocked-hosts-meta');
            if (currentMetric !== 'blocked_target') {
                wrap.classList.add('d-none');
                return;
            }
            wrap.classList.remove('d-none');
            if (!blockedHostMetricsEnabled) {
                body.innerHTML = '<tr><td colspan="4" class="text-muted">Blocked hostname metrics are disabled in settings.</td></tr>';
                meta.innerText = 'Disabled.';
                return;
            }
            if (blockedHostRetentionMode === 'rolling_24h_only') {
                const rows24 = (blockedHosts24h || [])
                    .map((h) => ({
                        hostname: String(h.hostname || '').trim(),
                        inbound: Number(h.inbound || 0),
                        outbound: Number(h.outbound || 0)
                    }))
                    .filter((h) => h.hostname)
                    .map((h) => ({ ...h, total: h.inbound + h.outbound }))
                    .sort((a, b) => b.total - a.total || a.hostname.localeCompare(b.hostname));
                body.innerHTML = '';
                if (!rows24.length) {
                    body.innerHTML = '<tr><td colspan="4" class="text-muted">No blocked hostname entries recorded in rolling 24h snapshots.</td></tr>';
                } else {
                    rows24.forEach((r) => {
                        const tr = document.createElement('tr');
                        const hostTd = document.createElement('td');
                        hostTd.className = 'mono';
                        hostTd.innerText = r.hostname;
                        const outTd = document.createElement('td');
                        outTd.className = 'text-end';
                        outTd.innerText = r.outbound.toLocaleString();
                        const inTd = document.createElement('td');
                        inTd.className = 'text-end';
                        inTd.innerText = r.inbound.toLocaleString();
                        const totalTd = document.createElement('td');
                        totalTd.className = 'text-end';
                        totalTd.innerText = r.total.toLocaleString();
                        tr.appendChild(hostTd);
                        tr.appendChild(outTd);
                        tr.appendChild(inTd);
                        tr.appendChild(totalTd);
                        body.appendChild(tr);
                    });
                }
                meta.innerText = 'All blocked hostnames across rolling 24h (5m snapshots).';
                return;
            }
            if (blockedHostRetentionMode === 'daily_only') {
                meta.innerText = `Daily snapshots only mode: showing last ${dayRange} day(s), including today-so-far.`;
            }
            const cutoff = Date.now() - dayRange * 24 * 60 * 60 * 1000;
            const totals = new Map();
            (blockedHostsDaily || []).forEach((d) => {
                const ts = new Date(d.timestamp).getTime();
                if (!Number.isFinite(ts) || ts < cutoff) return;
                (d.hosts || []).forEach((h) => {
                    const host = String(h.hostname || '').trim();
                    const inbound = Number(h.inbound || 0);
                    const outbound = Number(h.outbound || 0);
                    if (!host) return;
                    const prev = totals.get(host) || { inbound: 0, outbound: 0 };
                    prev.inbound += Number.isFinite(inbound) && inbound > 0 ? inbound : 0;
                    prev.outbound += Number.isFinite(outbound) && outbound > 0 ? outbound : 0;
                    totals.set(host, prev);
                });
            });
            const rows = Array.from(totals.entries())
                .map(([hostname, c]) => ({ hostname, inbound: c.inbound, outbound: c.outbound, total: c.inbound + c.outbound }))
                .sort((a, b) => b.total - a.total || a.hostname.localeCompare(b.hostname));
            body.innerHTML = '';
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="4" class="text-muted">No blocked hostname entries recorded for selected daily range.</td></tr>';
            } else {
                rows.forEach((r) => {
                    const tr = document.createElement('tr');
                    const hostTd = document.createElement('td');
                    hostTd.className = 'mono';
                    hostTd.innerText = r.hostname;
                    const outTd = document.createElement('td');
                    outTd.className = 'text-end';
                    outTd.innerText = r.outbound.toLocaleString();
                    const inTd = document.createElement('td');
                    inTd.className = 'text-end';
                    inTd.innerText = r.inbound.toLocaleString();
                    const totalTd = document.createElement('td');
                    totalTd.className = 'text-end';
                    totalTd.innerText = r.total.toLocaleString();
                    tr.appendChild(hostTd);
                    tr.appendChild(outTd);
                    tr.appendChild(inTd);
                    tr.appendChild(totalTd);
                    body.appendChild(tr);
                });
            }
            if (blockedHostRetentionMode !== 'daily_only') {
                meta.innerText = `All blocked hostnames across last ${dayRange} day(s), including today-so-far.`;
            }
        }

        function normalizeBlockedHostRetentionModeClient(raw) {
            const v = String(raw || '').trim().toLowerCase();
            if (v === 'rolling_24h_only' || v === 'rolling_24h_plus_daily' || v === 'daily_only') return v;
            return 'rolling_24h_plus_daily';
        }

        function bindTrendControls() {
            document.getElementById('trend-raw').addEventListener('click', () => {
                trendMode = 'raw';
                trendPoints = trend24h;
                renderTrend(trendPoints, document.getElementById('title').innerText, { hideList: currentMetric === 'blocked_target', showControls: true });
            });
            document.getElementById('trend-sum').addEventListener('click', () => {
                trendMode = 'sum';
                trendPoints = trendDaily;
                renderTrend(trendPoints, document.getElementById('title').innerText, { hideList: currentMetric === 'blocked_target', showControls: true });
            });
            [7, 30, 90, 180, 365].forEach((d) => {
                const btn = document.getElementById(`range-${d}`);
                if (!btn) return;
                btn.addEventListener('click', () => {
                    dayRange = d;
                    if (trendMode === 'sum') {
                        trendPoints = trendDaily;
                        renderTrend(trendPoints, document.getElementById('title').innerText, { hideList: currentMetric === 'blocked_target', showControls: true });
                    } else {
                        renderBlockedPortsTable();
                        renderBlockedHostsTable();
                    }
                });
            });
        }

        async function load() {
            const metric = queryMetric();
            const target = queryTarget();
            if (!metric) {
                document.getElementById('title').innerText = 'Missing metric parameter';
                return;
            }
            let endpoint = `/api/drilldown?metric=${encodeURIComponent(metric)}`;
            if (target) endpoint += `&target=${encodeURIComponent(target)}`;
            if (metric === 'blocked_target') endpoint += '&include_ports=1';
            const r = await fetch(endpoint);
            if (!r.ok) {
                document.getElementById('title').innerText = `Failed to load metric (${r.status})`;
                return;
            }
            const d = await r.json();
            try {
                const s = await fetch('/api/stats?ts=' + Date.now(), { cache: 'no-store' });
                if (s.ok) {
                    const sj = await s.json();
                    lastSnapshotTS = sj.timestamp;
                }
            } catch (e) {}
            nextRefreshAt = Date.now() + 300000;
            updateRefreshMeta();
            currentMetric = d.metric || metric;
            document.getElementById('title').innerText = d.title;
            if (d.metric === 'blocked_target') {
                document.getElementById('trend-raw').innerText = '24h (5m)';
                document.getElementById('trend-sum').innerText = 'Daily';
                trendBaseline = Number(d.baseline_24h || 0);
                trendBaselineCaptured = d.baseline_captured_utc || null;
                trend24h = d.trend_24h || d.trend || [];
                trendDaily = d.trend_daily || [];
                trendMA24h = d.trend_ma_24h || [];
                trendMADaily = d.trend_ma_daily || [];
                blockedPortDailyEnabled = d.blocked_port_daily_enabled !== false;
                blockedPortsDaily = d.blocked_ports_daily || [];
                blockedHostMetricsEnabled = d.blocked_host_metrics_enabled === true;
                blockedHostRetentionMode = normalizeBlockedHostRetentionModeClient(d.blocked_host_retention_mode || 'rolling_24h_plus_daily');
                blockedHostsDaily = d.blocked_hosts_daily || [];
                blockedHosts24h = d.blocked_hosts_24h || [];
                blockedMAWindow = Number(d.blocked_ma_window || blockedMAWindow || 12);
                blockedAnomalyPct = Number(d.blocked_anomaly_pct || blockedAnomalyPct || 50);
                blockedAnomalySource = String(d.anomaly_source || '5m').toLowerCase() === 'daily' ? 'daily' : '5m';
                const maWarmup = trendMA24h.length === 0
                    ? (blockedAnomalySource === 'daily'
                        ? ` | Baseline warming up (target ${blockedMAWindow} day window)`
                        : ` | MA warming up (needs > ${blockedMAWindow} points)`)
                    : ` | MA points: ${trendMA24h.length}`;
                document.getElementById('count').innerText = `${trend24h.length} point(s) in 24h(5m), ${trendDaily.length} point(s) daily${maWarmup}`;
                trendMode = 'raw';
                trendPoints = trend24h;
                renderTrend(trendPoints, d.target ? `${d.target} blocked traffic` : 'Blocked traffic', { hideList: true, showControls: true });
                return;
            }
            blockedPortsDaily = [];
            blockedPortDailyEnabled = true;
            blockedHostMetricsEnabled = false;
            blockedHostRetentionMode = 'rolling_24h_plus_daily';
            blockedHostsDaily = [];
            blockedHosts24h = [];
            renderBlockedPortsTable();
            renderBlockedHostsTable();
            if (d.metric === 'ven_warning' || d.metric === 'ven_error') {
                document.getElementById('trend-raw').innerText = '24h (5m)';
                document.getElementById('trend-sum').innerText = 'Daily';
            }
            document.getElementById('count').innerText = `${d.count} workload(s)`;
            const list = document.getElementById('items');
            list.classList.remove('d-none');
            list.innerHTML = '';
            if (!d.items || d.items.length === 0) {
                const li = document.createElement('li');
                li.className = 'list-group-item text-muted';
                li.innerText = 'No results for this metric in the latest collection cycle.';
                list.appendChild(li);
            } else {
                d.items.forEach((name) => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item mono';
                    li.innerText = name;
                    list.appendChild(li);
                });
            }
            if (d.metric === 'ven_warning' || d.metric === 'ven_error' || String(d.metric || '').startsWith('mode_')) {
                trend24h = d.trend_24h || d.trend || [];
                trendDaily = d.trend_daily || [];
                trendMA24h = d.trend_ma_24h || [];
                trendMADaily = d.trend_ma_daily || [];
                blockedMAWindow = Number(d.anomaly_window || d.blocked_ma_window || blockedMAWindow || 12);
                blockedAnomalyPct = Number(d.anomaly_pct || d.blocked_anomaly_pct || blockedAnomalyPct || 50);
                blockedAnomalySource = String(d.anomaly_source || '5m').toLowerCase() === 'daily' ? 'daily' : '5m';
                trendMode = 'raw';
                trendPoints = trend24h;
                document.getElementById('trend-raw').innerText = '24h (5m)';
                document.getElementById('trend-sum').innerText = 'Daily';
                const anomalyText = d.anomaly_reason
                    ? ` | Anomaly: ${d.anomaly_reason}`
                    : (d.anomalous ? ' | Anomaly: triggered' : '');
                document.getElementById('count').innerText = `${d.count} workload(s)${anomalyText}`;
                renderTrend(trendPoints, d.title, { hideList: false, showControls: true });
            } else if (d.metric === 'tampering') {
                trend24h = d.trend_24h || d.trend || [];
                trendDaily = d.trend_daily || [];
                trendMA24h = d.trend_ma_24h || [];
                trendMADaily = d.trend_ma_daily || [];
                blockedMAWindow = Number(d.anomaly_window || d.blocked_ma_window || blockedMAWindow || 12);
                blockedAnomalyPct = Number(d.anomaly_pct || d.blocked_anomaly_pct || blockedAnomalyPct || 50);
                blockedAnomalySource = String(d.anomaly_source || '5m').toLowerCase() === 'daily' ? 'daily' : '5m';
                trendMode = 'raw';
                trendPoints = trend24h;
                const anomalyText = d.anomaly_reason
                    ? ` | Anomaly: ${d.anomaly_reason}`
                    : (d.anomalous ? ' | Anomaly: triggered' : '');
                document.getElementById('count').innerText = `${d.count} workload(s)${anomalyText}`;
                document.getElementById('trend-raw').innerText = '24h (5m)';
                document.getElementById('trend-sum').innerText = 'Daily';
                renderTrend(trendPoints, d.title, { hideList: false, showControls: true });
            } else {
                document.getElementById('trend-controls').classList.add('d-none');
                trendPoints = d.trend || [];
                renderTrend(trendPoints, d.title, { hideList: false, showControls: false });
            }
        }

        initTheme();
        UICommon.applyMetricTooltips();
        const toggleBlockedPortsBtn = document.getElementById('btn-toggle-blocked-ports');
        if (toggleBlockedPortsBtn) {
            toggleBlockedPortsBtn.addEventListener('click', () => {
                blockedPortsCollapsed = !blockedPortsCollapsed;
                renderBlockedPortsTable();
            });
        }
        if (!statusTimer) {
            statusTimer = setInterval(updateRefreshMeta, 1000);
        }
        setExportLinks();
        bindTrendControls();
        load();
        setInterval(load, 300000);
    </script>
</body>
</html>
